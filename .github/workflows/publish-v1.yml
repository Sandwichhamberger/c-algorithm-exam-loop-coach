name: Publish v1.0.0 Skill ZIP

"on":
  push:
    branches: [main]
    paths:
      - .github/workflows/publish-v1.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Build release asset
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > 'C语言考研算法闭环教练-Skill.zip'
      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.0.0 --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload v1.0.0 'C语言考研算法闭环教练-Skill.zip' --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create v1.0.0 'C语言考研算法闭环教练-Skill.zip' --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title 'C语言考研算法闭环教练 v1.0.0' --notes '首个公开版本：包含标准 SKILL.md、Skill 界面元数据和 1/3/7/14 天间隔复习脚本。题目来源不得虚构。'
          fi
